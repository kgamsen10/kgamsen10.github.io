<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lists Demo</title>
        <link rel="stylesheet" href="css/styl3.css">
    </head>
    <body>
        <ul>
            <li>Wow, I'm the first item in a list!</li>
            <li>Item 2</li>
            <li><b>Bat</b></li>
            <li>Iguana</li>
            <li>Zebra</li>
        </ul>
        <hr>
        <ol>
            <li>
                Pikachu<br>Jigglypuff<br>Charizard
            </li>
            <li>Sylveon<br>Lucario<br>Oshawatt<br></li>
            <li>Mewtwo<br>Rowlett<br></li>
            <li>Araquanid<br>Mimikyu<br>Rockruff</li>
        </ol>
    </body>
</html>
